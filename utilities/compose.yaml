# Utilities Stack
# This stack provides file management, document processing, and utility services for your homelab.
#
# Note: Both mapped and exposed ports are documented. The long-term plan is to reduce direct port exposure in favor of reverse proxying for internal services.
#
# Security Warning: Docker Socket Access
# The cup service mounts /var/run/docker.sock, which grants full access to the Docker daemon.
# This is required for Docker integration but poses a security risk in untrusted networks.
# - Only enable this in trusted internal networks
# - See: https://docs.docker.com/engine/security/
#
# Required environment variables:
# - DOCKER_DATA_BASEFOLDER: Base directory for persistent data
# - DOCKER_MEDIA_BASEFOLDER: Base directory for media files
#
# Optional environment variables:
# - TELEGRAM_API_ID: Telegram API ID for telegram-files
# - TELEGRAM_API_HASH: Telegram API hash for telegram-files
# - FILEBROWSER_ADMIN_PASSWORD: Admin password for FileBrowser (default: admin)

name: utilities

services:
  convertx:
    image: ghcr.io/c4illin/convertx
    container_name: convertx
    restart: unless-stopped
    expose:
      - 3000 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - ACCOUNT_REGISTRATION=false
      - HTTP_ALLOWED=true
      - ALLOW_UNAUTHENTICATED=false
      - AUTO_DELETE_EVERY_N_HOURS=24
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/convertx:/app/data
    networks:
      - npm_network

  cup:
    image: ghcr.io/sergi0g/cup:latest
    container_name: cup
    restart: unless-stopped
    command: serve
    expose:
      - 8000 # Web UI (internal, for reverse proxy or internal access)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - npm_network

  filebrowser-quantum:
    image: gtstef/filebrowser
    container_name: filebrowser-quantum
    environment:
      FILEBROWSER_CONFIG: data/config.yaml
      FILEBROWSER_ADMIN_PASSWORD: ${FILEBROWSER_ADMIN_PASSWORD}
      TZ: Europe/Rome
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/test:/srv
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/filebrowser-quantum/data:/home/filebrowser/data # mount the data folder you created with the config file.
      # Advanced: If you plan to run with a different user besides root or filebrowser, you will need to mount a tmp directory.
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/filebrowser-quantum/tmp/:/home/filebrowser/tmp/
    expose:
      - 80 # Web UI (internal, for reverse proxy or internal access)
    # Optionally run as non-root filebrowser user
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - npm_network

  telegram-files:
    image: ghcr.io/jarvis2f/telegram-files:latest
    container_name: telegram-files
    restart: unless-stopped
    expose:
      - 80 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - APP_ENV=prod
      - APP_ROOT=/app/data
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/tg-files:/app/data
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}/telegram:/media
    networks:
      - npm_network

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:latest
    container_name: upsnap
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Rome
      - UPSNAP_HTTP_LISTEN=0.0.0.0:5001
      - UPSNAP_INTERVAL=*/10 * * * * *
      - UPSNAP_SCAN_RANGE=192.168.0.0/24
      - UPSNAP_WEBSITE_TITLE=UpSnap
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/upsnap/data:/app/pb_data

networks:
  npm_network:
    name: npm_network
    external: true
