# Immich Stack
# This stack provides a self-hosted photo and video backup solution.
#
# Note: Both mapped and exposed ports are documented. The long-term plan is to reduce direct port exposure in favor of reverse proxying for internal services.
#
# ⚠️ IMPORTANT: This file is a reference copy from the official Immich releases.
# To update Immich, download the latest compose from:
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# Minimal changes made to this file:
# - Modified Watchtower labels (com.centurylinklabs.watchtower.enable=false)
#
# When updating from upstream:
# 1. Download the latest docker-compose.yml from releases
# 2. Reapply ONLY the Watchtower labels and env changes above
# 3. DO NOT commit large structural changes unless absolutely necessary
#
# Official Immich documentation: https://immich.app/docs/install/docker-compose
#
# Required environment variables:
# - ${UPLOAD_LOCATION}
# - ${DB_DATA_LOCATION}
# - ${IMMICH_VERSION}
# - ${DB_PASSWORD}
# - ${DB_USERNAME}
# - ${DB_DATABASE_NAME}

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - stack.env
    environment:
      IMMICH_HOST: ${IMMICH_HOST:-0.0.0.0}
    expose:
      - 2283 # Web UI/API (internal, for reverse proxy or internal access)
    depends_on:
      - redis
      - database
    restart: always
    user: "1000:1000"
    healthcheck:
      disable: false
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - immich_network
      - npm_network

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - stack.env
    environment:
      IMMICH_HOST: ${IMMICH_HOST:-0.0.0.0}
    restart: always
    healthcheck:
      disable: false
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - immich_network

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
    volumes:
      - redis_data:/data
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - immich_network

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - immich_network
    healthcheck:
      disable: false

networks:
  immich_network:
    name: immich_network
    driver: bridge
  npm_network:
    name: npm_network
    external: true

volumes:
  model-cache:
  redis_data:
