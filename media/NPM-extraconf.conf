# TinyAuth-gated LAN template.
# Shared policy: docs/nginx-proxy-manager.md
# Source: https://tinyauth.app/docs/guides/nginx-proxy-manager/

# Root location
location / {
    # Pass the request to the app
    proxy_pass $forward_scheme://$server:$port;

    # Add other app specific config here

    # Allow access from LAN + Tailscale; everything else goes through auth_request
    satisfy any;
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    allow 10.0.0.0/8;
    allow 100.64.0.0/10;
    deny all; # Tutto il resto passa all'auth_request

    # Tinyauth auth request
    auth_request /tinyauth;
    error_page 401 = @tinyauth_login;
}

# Tinyauth auth request
location /tinyauth {
    # Pass request to Tinyauth
    proxy_pass http://tinyauth:3000/api/auth/nginx;

    # Pass the request headers
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Uri $request_uri;
}

# Tinyauth login redirect
location @tinyauth_login {
    return 302 http://tinyauth.alsd.duckdns.org/login?redirect_uri=$scheme://$host$request_uri;
}
