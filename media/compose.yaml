# Media Stack
# This stack provides media servers, media downloaders, and automation services.
#
# Note: Both mapped and exposed ports are documented. The long-term plan is to reduce direct port exposure in favor of reverse proxying for internal services.
#
# Required environment variables:
# - DOCKER_DATA_BASEFOLDER: Base directory for persistent data
# - DOCKER_MEDIA_BASEFOLDER: Base directory for media files
# - QBITTORRENT_USERNAME: qBittorrent Web UI username used by qbit_manage
# - QBITTORRENT_PASSWORD: qBittorrent Web UI password used by qbit_manage
# - SONARR_API_KEY: API key for Sonarr
# - AW_APP_KEY: Application key for aw-downloader
#
name: media

services:
  aw-downloader:
    image: ghcr.io/savvymeat/aw-downloader:latest
    container_name: aw-downloader
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/aw-downloader:/app/storage
      ## TV Shows folders
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}/anime:/media/anime
    environment:
      - APP_KEY=${AW_APP_KEY}
    expose:
      - 6547 # Web UI (internal, for reverse proxy or internal access)
    restart: unless-stopped
    networks:
      - media_network
      - npm_network

  cinerr:
    image: alexkouzel/cinerr:latest
    container_name: cinerr
    restart: unless-stopped
    expose:
      - 8080 # Web UI (internal, for reverse proxy or internal access)
    volumes:
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}:/media:ro
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/cinerr:/data
    networks:
      - media_network
      - npm_network

  medialyze:
    image: ghcr.io/frederikemmer/medialyze:latest
    container_name: medialyze
    restart: unless-stopped
    expose:
      - 8080 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - TZ=UTC
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/medialyze/config:/config
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}:/media:ro
    networks:
      - media_network
      - npm_network

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    restart: unless-stopped
    expose:
      - 8191 # API (internal, for reverse proxy or internal access)
    networks:
      - media_network
      - npm_network

  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    expose:
      - 8096 # rimossi 8920 (HTTPS off) e 7359/udp (broadcast non passa il bridge)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/jellyfin/library:/config
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}:/media
    tmpfs:
      - /config/data/transcodes:rw,size=2g,mode=1777 # transcodes in RAM, salva l'NVMe
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "105" # render gid del host (esplicito invece di sperare nel mapping dinamico)
    mem_limit: 4g
    cpus: 3.5
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - media_network
      - npm_network

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    # Disabled: Use reverse proxy instead (port is exposed below)
    # ports:
    #   - 5055:5055 # Web UI (external mapping)
    expose:
      - 5055 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Rome
    user: "1000:1000"
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/jellyseerr/config:/app/config
    networks:
      - media_network
      - npm_network

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    dns:
      - 10.250.250.10 # Pi-hole on pihole_network for per-container query attribution
    expose:
      - 9696 # Web UI/API (internal, for reverse proxy or internal access)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/prowlarr:/config
    networks:
      - media_network
      - pihole_network
      - npm_network

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: always
    ports:
      - 6881:6881 # Torrent (TCP, external mapping)
      - 6881:6881/udp # Torrent (UDP, external mapping)
    expose:
      - 8003 # Web UI (internal, for reverse proxy or internal access)
      - 6881 # Torrent (TCP, internal, for internal container communication)
      - 6881/udp # Torrent (UDP, internal, for internal container communication)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - WEBUI_PORT=8003
      - TORRENTING_PORT=6881
      - DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/qbittorrent/config:/config
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}/downloads:/downloads
    networks:
      - media_network
      - npm_network

  qbit-manage:
    image: ghcr.io/stuffanthings/qbit_manage:latest
    container_name: qbit-manage
    restart: unless-stopped
    depends_on:
      - qbittorrent
    # Maintenance worker with an internal Web UI/API on 8181; expose through NPM and Homepage, not the host.
    expose:
      - 8181 # Web UI/API (internal, for reverse proxy or internal access)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
      - QBT_WEB_SERVER=true
      - QBT_PORT=8181
      - QBT_CONFIG_DIR=/config
      - QBT_RUN=false
      - QBT_SCHEDULE=1440
      - QBT_STARTUP_DELAY=120
      - QBT_RECHECK=true
      - QBT_CAT_UPDATE=false
      - QBT_TAG_UPDATE=true
      - QBT_REM_UNREGISTERED=false
      - QBT_REM_ORPHANED=false
      - QBT_TAG_TRACKER_ERROR=true
      - QBT_TAG_NOHARDLINKS=true
      - QBT_SHARE_LIMITS=false
      - QBT_SKIP_CLEANUP=true
      - QBT_DRY_RUN=false
      - QBT_LOG_LEVEL=INFO
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/qbit-manage:/config
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}/downloads:/downloads
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/qbittorrent/config:/qbittorrent:ro
    networks:
      - media_network
      - npm_network

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    expose:
      - 7878 # Web UI/API (internal, for reverse proxy or internal access)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/radarr:/config
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}:/media
    networks:
      - media_network
      - npm_network

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    expose:
      - 8989 # Web UI/API (internal, for reverse proxy or internal access)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/sonarr/config:/config
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}:/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8989"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - media_network
      - npm_network

networks:
  media_network:
    name: media_network
    driver: bridge
  npm_network: # to expose container to NPM for reverse proxy
    name: npm_network
    external: true
  pihole_network:
    name: pihole_network
    external: true
