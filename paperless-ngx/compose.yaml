# Paperless-ngx Stack
# This stack provides a document management system with OCR, full-text search, and organization capabilities.
#
# Note: Both mapped and exposed ports are documented. The long-term plan is to reduce direct port exposure in favor of reverse proxying for internal services.
#
# Features:
# - Apache Tika and Gotenberg for document conversion
# - SQLite database with persistent storage
# - OCR and full-text search capabilities
# - Import/export folder support
#
# Required environment variables:
# - DOCKER_DATA_BASEFOLDER: Base directory for persistent data
#
# Official documentation:
# https://docs.paperless-ngx.com/

name: paperless-ngx

services:
  broker:
    image: docker.io/library/redis:7
    container_name: paperless-ngx-broker-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - paperless_network

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.7
    container_name: paperless-ngx-gotenberg
    restart: unless-stopped
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - paperless_network

  tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-ngx-tika
    restart: unless-stopped
    networks:
      - paperless_network

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    user: "1000:1000"
    # https://github.com/paperless-ngx/paperless-ngx/blob/main/docker/compose/docker-compose.sqlite-tika.yml
    # https://docs.paperless-ngx.com/setup/#installation
    restart: unless-stopped
    depends_on:
      - broker
      - gotenberg
      - tika
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/paperless-ngx/export:/usr/src/paperless/export
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/paperless-ngx/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
    networks:
      - paperless_network
      - npm_network

networks:
  paperless_network:
    name: paperless_network
    driver: bridge
  npm_network:
    name: npm_network
    driver: bridge
    external: true

volumes:
  data:
  media:
  redisdata:
