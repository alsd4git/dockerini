# KaraKeep Stack
# This stack provides a modern bookmarks/media organization and management platform.
#
# Note: Both mapped and exposed ports are documented. The long-term plan is to reduce direct port exposure in favor of reverse proxying for internal services.
#
# Required environment variables:
# - KARAKEEP_VERSION: Version of KaraKeep to use (default: release)
#
# Optional environment variables:
# - OPENAI_API_KEY: API key for OpenAI features (currently commented out in web service)

# docs https://docs.karakeep.app/Installation/docker
# migrated from hoarder

name: karakeep

services:
  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep-chrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    expose:
      - 9222 # Chrome remote debugging (internal, for reverse proxy or internal access)
    networks:
      - karakeep_network

  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    container_name: karakeep-meilisearch
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meilisearch:/meili_data
    expose:
      - 7700 # MeiliSearch API (internal, for reverse proxy or internal access)
    networks:
      - karakeep_network

  web:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: karakeep
    restart: unless-stopped
    volumes:
      - data:/data
    expose:
      - 3000 # Web UI (internal, for reverse proxy or internal access)
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DISABLE_SIGNUPS: ${DISABLE_SIGNUPS:-false}
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATA_DIR: /data
    depends_on:
      - chrome
      - meilisearch
    networks:
      - karakeep_network
      - npm_network

networks:
  karakeep_network:
    name: karakeep_network
    driver: bridge
  npm_network:
    name: npm_network
    external: true

volumes:
  meilisearch:
  data:
