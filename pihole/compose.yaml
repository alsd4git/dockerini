# Pi-hole Stack
# This stack provides a network-wide ad blocking solution using Pi-hole,
# with dnscrypt-proxy providing encrypted upstream DNS-over-HTTPS (DoH).
#
# Required environment variables:
# - DOCKER_DATA_BASEFOLDER: Base directory for persistent data
# - PASSWORD: Web interface password
#
# Optional configuration:
# - Uncomment DHCP ports if using Pi-hole as DHCP server
# - Uncomment capabilities if using DHCP or NTP

name: pihole

services:
  dnscrypt-proxy:
    container_name: dnscrypt-proxy
    image: klutchell/dnscrypt-proxy:latest
    restart: unless-stopped
    # Listens on :5053 inside pihole_network and forwards via DoH (HTTPS)
    # to Cloudflare and Quad9. The ISP only sees TLS to those endpoints.
    environment:
      TZ: Europe/Rome
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/dnscrypt-proxy:/config
    networks:
      pihole_network:
        ipv4_address: 10.250.250.11
    healthcheck:
      # Probe DoH resolution from inside the container; busybox nslookup is
      # available in the distroless image's base layer.
      test: ["CMD", "/usr/local/bin/dnscrypt-proxy", "-resolve", "cloudflare.com", "-config", "/config/dnscrypt-proxy.toml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  pihole:
    container_name: pihole
    hostname: pi.hole-docker
    image: pihole/pihole:latest
    depends_on:
      dnscrypt-proxy:
        condition: service_healthy
    ports:
      - 53:53/tcp # DNS (TCP, external mapping)
      - 53:53/udp # DNS (UDP, external mapping)
      # Disabled: Use reverse proxy instead
      # - 81:80/tcp    # Web interface (external mapping)
      # - 443:443/tcp  # HTTPS (self-signed cert, external mapping)
      # Disabled: Uncomment if using Pi-hole as DHCP server
      # - 67:67/udp # DHCP server (external mapping)
    expose:
      - 80 # Web interface (internal, for reverse proxy or internal access)
    environment:
      TZ: Europe/Rome
      FTLCONF_webserver_api_password: ${PASSWORD}
      FTLCONF_dns_listeningMode: all
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/pihole/etc-pihole:/etc/pihole
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    # cap_add:
    #   - NET_ADMIN # Required for DHCP
    #   - SYS_TIME # Required for NTP
    #   - SYS_NICE # Optional, for better performance
    restart: unless-stopped
    networks:
      pihole_network:
        ipv4_address: 10.250.250.10
      npm_network: {}

networks:
  pihole_network:
    name: pihole_network
    driver: bridge
    ipam:
      config:
        - subnet: 10.250.250.0/24
  npm_network: # to expose container to NPM for reverse proxy
    name: npm_network
    external: true
