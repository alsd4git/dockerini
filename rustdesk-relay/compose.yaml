# RustDesk Relay Stack
# Required environment variables:
# - DOCKER_DATA_BASEFOLDER: Base folder for persistent data
#
# Note: This stack uses host networking for optimal performance. All required ports are documented below. The long-term plan is to reduce direct port exposure and use reverse proxying where possible, but host networking is required for RustDesk relay.
#
# docs https://rustdesk.com/docs/en/self-host/rustdesk-server-oss/docker/#requirements
# Ports (required for RustDesk relay):
# - 21115/tcp: HBBS - used for the NAT type test.
# - 21116/tcp: HBBS - used for TCP hole punching and connection service.
# - 21116/udp: HBBS - used for the ID registration and heartbeat service.
# - 21117/tcp: HBBR - used for the Relay services.
# - 21118/tcp: HBBS - used to support web clients.
# - 21119/tcp: HBBR - used to support web clients.

services:
  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/RustDesk:/root
    network_mode: host
    expose:
      - 21115 # NAT type test (tcp)
      - 21116 # TCP hole punching and connection service (tcp & udp)
      - 21118 # Web client support (tcp)
    depends_on:
      - hbbr
    restart: unless-stopped

  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/RustDesk:/root
    network_mode: host
    expose:
      - 21117 # Relay services (tcp)
      - 21119 # Web client support (tcp)
    restart: unless-stopped
