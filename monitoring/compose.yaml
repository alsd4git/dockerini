# Monitoring Stack
# This stack provides system monitoring, dashboards, and observability tools.
#
# Note: Both mapped and exposed ports are documented. The long-term plan is to reduce direct port exposure in favor of reverse proxying for internal services.
#
# Security Warning: Docker Socket & Privileged Access
# Several services in this stack require elevated privileges:
# - dashdot: runs as privileged=true (full host access) for system metrics
# - homeassistant: runs as privileged=true and network_mode=host (required for Bluetooth)
# - dozzle, glances, homarr, homepage: mount /var/run/docker.sock (Docker daemon access)
# - beszel-agent: mounts /var/run/docker.sock for container monitoring
# These are necessary for monitoring functionality but should only be used in trusted networks.
# See: https://docs.docker.com/engine/security/
#
# Required environment variables:
# - DOCKER_DATA_BASEFOLDER: Base directory for persistent data
# - DOCKER_MEDIA_BASEFOLDER: Base directory for media files
# - BESZEL_SSH_KEY: SSH public key for Beszel agent authentication
# - BESZEL_TOKEN: Authentication token for Beszel agent
# - BESZEL_HUB_URL: Beszel hub URL
#
# Optional environment variables:
# - HOMARR_SECRET_ENCRYPTION_KEY: Secret key for Homarr (generate with: openssl rand -hex 32)
# - SPEEDTEST_TRACKER_APP_KEY: App key for Speedtest Tracker (generate with: openssl rand -base64 32)

name: monitoring

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - 8090:8090 # Web interface (external mapping)
    expose:
      - 8090 # Web interface (internal, for reverse proxy or internal access)
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/beszel/beszel_data:/beszel_data
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/beszel/beszel_socket:/beszel_socket
    networks:
      - monitoring_network
      - npm_network

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/beszel/beszel_agent_data:/var/lib/beszel-agent
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/beszel/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      HUB_URL: ${BESZEL_HUB_URL}
      KEY: ${BESZEL_SSH_KEY}
      TOKEN: ${BESZEL_TOKEN}
      LISTEN: /beszel_socket/beszel.sock

  dashdot:
    image: mauricenino/dashdot:latest
    container_name: dashdot
    restart: unless-stopped
    privileged: true
    ports:
      - 3002:3001 # Web UI (external mapping)
    expose:
      - 3001 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - DASHDOT_SHOW_HOST=true
      - DASHDOT_SHOW_DASH_VERSION=true
      - DASHDOT_ENABLE_CPU_TEMPS=true
      - DASHDOT_ALWAYS_SHOW_PERCENTAGES=true
    volumes:
      - /:/mnt/host:ro
    networks:
      - monitoring_network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - 8081:8080 # Web UI (external mapping)
    expose:
      - 8080 # Web UI (internal, for reverse proxy or internal access)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_ENABLE_SHELL=true
    networks:
      - monitoring_network

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    ports:
      - 61208:61208 # Web UI/API (external mapping)
    expose:
      - 61208 # Web UI/API (internal, for reverse proxy or internal access)
    pid: host
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/glances/glances.conf:/etc/glances.conf
      - ${DOCKER_MEDIA_BASEFOLDER:-/opt/docker/media}:/fs/media:ro
      - /etc/os-release:/etc/os-release:ro
      - /home:/fs/home:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GLANCES_OPT=-w
    networks:
      - monitoring_network

  homeassistant:
    image: linuxserver/homeassistant:latest
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true # Required for Bluetooth
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - DOCKER_MODS=linuxserver/mods:homeassistant-hacs
    # cap_add: #cap_add is not needed when using privileged: true
    #   - NET_ADMIN
    #   - NET_RAW
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/homeassistant/config:/config
      - /run/dbus:/run/dbus:ro # Required for Bluetooth, you also need Bluez on the host
    ports:
      - 8123:8123 # Web UI (external mapping)
    expose:
      - 8123 # Web UI (internal, for reverse proxy or internal access)

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - 3001:3000 # Web UI (external mapping)
    expose:
      - 3000 # Web UI (internal, for reverse proxy or internal access)
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring_network

  homebox:
    image: ghcr.io/sysadminsmedia/homebox:latest-rootless
    container_name: homebox
    restart: always
    ports:
      - 3100:7745 # Web UI (external mapping)
    expose:
      - 7745 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - HBOX_LOG_LEVEL=info
      - HBOX_LOG_FORMAT=text
      - HBOX_WEB_MAX_UPLOAD_SIZE=10
      - HBOX_OPTIONS_ALLOW_REGISTRATION=false
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/homebox:/data
    user: "1000:1000"
    networks:
      - monitoring_network

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/homarr/appdata:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}
    ports:
      - 7575:7575 # Web UI (external mapping)
    expose:
      - 7575 # Web UI (internal, for reverse proxy or internal access)
    networks:
      - monitoring_network

  netalertx:
    image: ghcr.io/netalertx/netalertx:latest
    container_name: netalertx
    restart: unless-stopped
    network_mode: host
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    environment:
      - LISTEN_ADDR=${LISTEN_ADDR:-0.0.0.0}
      - PORT=20211
      - GRAPHQL_PORT=${GRAPHQL_PORT:-20212}
    volumes:
      - type: bind
        source: ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/netalertx/data
        target: /data
        read_only: false
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    tmpfs:
      - "/tmp:uid=${NETALERTX_UID:-20211},gid=${NETALERTX_GID:-20211},mode=1700,rw,noexec,nosuid,nodev,async,noatime,nodiratime"
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512

  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    restart: unless-stopped
    ports:
      - 8083:8080 # Web UI (external mapping)
      - 8086:8086 # InfluxDB (external mapping)
    expose:
      - 8080 # Web UI (internal, for reverse proxy or internal access)
      - 8086 # InfluxDB (internal, for reverse proxy or internal access)
    cap_add:
      - SYS_RAWIO
    devices:
      - /dev/sda
    stdin_open: true
    tty: true
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/scrutiny/config:/opt/scrutiny/config
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/scrutiny/influxdb2:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    networks:
      - monitoring_network

  speedtest-tracker:
    image: linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    ports:
      - 8084:80 # Web UI (external mapping)
    expose:
      - 80 # Web UI (internal, for reverse proxy or internal access)
    environment:
      - PUID=1000
      - PGID=1000
      - DB_CONNECTION=sqlite
      - APP_KEY=${SPEEDTEST_TRACKER_APP_KEY}
      - APP_TIMEZONE=Europe/Rome
      - DISPLAY_TIMEZONE=Europe/Rome
      - SPEEDTEST_SCHEDULE=*/30 * * * *
      - PRUNE_RESULTS_OLDER_THAN=0
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/speedtest-tracker:/config
    networks:
      - monitoring_network

  wyl:
    image: aceberg/watchyourlan:v2
    container_name: watchyourlan
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Rome
      - IFACES=eth0
      - HOST=0.0.0.0
      - PORT=8840
      - TIMEOUT=120
      - SHOUTRRR_URL=
      - THEME=sand
      - COLOR=dark
    volumes:
      - ${DOCKER_DATA_BASEFOLDER:-/opt/docker/data}/wyl2:/data/WatchYourLAN
    ports:
      - 8840:8840 # Web UI (external mapping)
    expose:
      - 8840 # Web UI (internal, for reverse proxy or internal access)

networks:
  monitoring_network:
    name: monitoring_network
    driver: bridge
  npm_network: # to expose container to NPM for reverse proxy
    name: npm_network
    driver: bridge
    external: true
